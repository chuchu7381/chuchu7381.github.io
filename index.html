<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>快速查找資料小工具</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="手創空間快速查找資料小工具 — 一鍵開啟課程課表、教案、照片與材料包資料夾">
<link rel="preconnect" href="https://trgo.sharepoint.com">

<style>
  :root{
    --brand:#364963;
    --accent:#2d6cdf;
    --bg:#f5f0e8;
    --card:#fff;
    --border:#d0d7de;
    --muted:#777;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:var(--bg); color:#000;
    font-family:"Noto Sans TC",system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
  }
  .wrap{
    min-height:100%; display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .card{
    width:100%; max-width:720px; background:var(--card);
    border:2px solid var(--brand); border-radius:20px; box-shadow:6px 6px 0 var(--brand);
    padding:24px;
  }
  h1{margin:0 0 6px; font-size:22px; font-weight:900; letter-spacing:-.2px}
  .sub{margin:0 0 16px; font-size:12px; color:var(--muted)}

  /* Section title */
  .section-title{
    font-size:11px; font-weight:700; color:#999; letter-spacing:1.5px;
    text-transform:uppercase; margin:6px 0 8px;
  }
  .section-header{display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:6px}
  .select-all-btn{
    font-size:11px; color:var(--accent); background:none; border:none;
    cursor:pointer; font-weight:700; padding:2px 6px; border-radius:4px;
    transition:.15s;
  }
  .select-all-btn:hover{background:rgba(45,108,223,.08)}
  .select-all-btn:focus-visible{outline:2px solid var(--accent); outline-offset:2px}

  /* Chips */
  .chips{display:flex; flex-wrap:wrap; gap:10px; margin-bottom:12px}
  .chip{
    padding:8px 14px; border-radius:999px; border:2px solid var(--border);
    background:#fff; color:#444; font-weight:800; font-size:13px;
    cursor:pointer; user-select:none; transition:all .2s ease;
  }
  .chip:hover{transform:translateY(-1px); border-color:var(--accent)}
  .chip:focus-visible{outline:2px solid var(--accent); outline-offset:2px}
  .chip:active{transform:scale(.96)}
  .chip.selected{
    background:var(--accent); border-color:var(--accent); color:#fff;
    box-shadow:0 4px 14px rgba(45,108,223,.3);
  }

  /* Action row */
  .row{display:flex; flex-wrap:wrap; gap:10px; align-items:stretch; margin-top:8px}
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding:12px 18px; border-radius:12px;
    border:2px solid #FF9800;
    background:#FF9800;
    color:#fff;
    font-weight:800; font-size:14px;
    cursor:pointer; white-space:nowrap;
    transition:all .2s ease;
  }
  .btn:hover{transform:translateY(-2px); box-shadow:0 4px 12px rgba(255,152,0,.35)}
  .btn:focus-visible{outline:2px solid var(--brand); outline-offset:2px}
  .btn:active{transform:scale(.97)}
  .btn:disabled{opacity:.5; cursor:not-allowed; transform:none; box-shadow:none}
  .badge{
    background:rgba(255,255,255,.3); padding:1px 8px; border-radius:999px;
    font-size:12px; font-weight:900; min-width:20px; text-align:center;
  }

  /* Fallback */
  .fallback{display:none; margin-top:10px}
  .danger{color:#c0392b; font-size:12px; margin-top:10px}
  .link-list{margin:6px 0 0; padding-left:18px}
  .link-list li{margin-bottom:4px}
  .link-list a{word-break:break-all; color:var(--accent)}
  .sr-only{position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); border:0}

  /* Mobile */
  @media(max-width:480px){
    .wrap{padding:12px}
    .card{padding:16px; border-radius:14px}
    h1{font-size:18px}
    .chip{padding:10px 16px; font-size:14px}
    .btn{padding:14px 18px; width:100%}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="card" role="region" aria-label="快速查找資料小工具">
    <h1>🔎 手創空間快速查找資料小工具</h1>
    <p class="sub">按鈕可複選（選取會變藍）。按下「開啟選擇的資料夾」後，可能遭「彈出式視窗阻擋」功能攔截（網址處最右邊），請改為一律允許</p>

    <div class="section-header">
      <div class="section-title" style="margin:0">常用資料夾（可複選）</div>
      <button type="button" class="select-all-btn" id="selectAllBtn" title="全選 / 取消全選">全選</button>
    </div>
    <div id="chips" class="chips" role="group" aria-label="常用資料夾按鈕群組"></div>

    <div class="row">
      <button class="btn" id="openSelectedBtn" disabled title="一次開啟所有選取的資料夾">
        📂 開啟選擇的資料夾
        <span class="badge" id="countBadge">0</span>
      </button>
    </div>

    <div id="fallback" class="fallback">
      <div class="danger">部分分頁可能被瀏覽器的「彈出式視窗阻擋」功能攔截。請允許此頁面開啟新分頁，或手動點以下連結逐一開啟：</div>
      <ul id="fallbackList" class="link-list"></ul>
    </div>
  </div>
</div>

<script>
const FOLDERS = [
  { id: "schedule", name: "課程課表",  url: "https://trgo.sharepoint.com/:f:/s/internaltric1/tl000/IgDQW2cwk-a4SaD4FwFUnP-fAdQbwoc2YnyEZVDwGUz3lRU?e=Kp4Hca" },
  { id: "lesson",   name: "課程教案",  url: "https://trgo.sharepoint.com/:f:/s/internaltric1/tl000/IgB4RWIhIJH3Q7zBzAIRBn8fAQqUsWGqRTzysLk4paVcF1E?e=V9yTZx" },
  { id: "photos",   name: "課程照片",  url: "https://trgo.sharepoint.com/:f:/s/internaltric1/tl000/IgCrjymP_FRwSI6GBknaOeyXAS-1QJmbC9XEdhQJ7kO0pnI?e=PPdaqt" },
  { id: "kitp",     name: "材料包照片",url: "https://trgo.sharepoint.com/:f:/s/internaltric1/tl000/IgBlVvD3io8qToW1XBrNf8PXAQbK6w7AEoE-lqh3V_Pn3kQ?e=vaGRId" },
  { id: "kitv",     name: "材料包影片",url: "https://trgo.sharepoint.com/:f:/s/internaltric1/tl000/IgAP8XKVjlAGR4nK0sewNMPUASB8g8Jha_Zuvnhr6g6Eaok?e=W14wDX" },
];

const chipsBox = document.getElementById("chips");
const openBtn = document.getElementById("openSelectedBtn");
const countBadge = document.getElementById("countBadge");
const selectAllBtn = document.getElementById("selectAllBtn");

function updateState() {
  const count = document.querySelectorAll(".chip.selected").length;
  countBadge.textContent = count;
  openBtn.disabled = count === 0;
  selectAllBtn.textContent = count === FOLDERS.length ? "取消全選" : "全選";
}

FOLDERS.forEach(f => {
  const btn = document.createElement("button");
  btn.type = "button";
  btn.className = "chip";
  btn.textContent = f.name;
  btn.title = f.name;
  btn.dataset.id = f.id;
  btn.setAttribute("aria-pressed", "false");
  btn.onclick = () => {
    const on = btn.classList.toggle("selected");
    btn.setAttribute("aria-pressed", on ? "true" : "false");
    updateState();
  };
  chipsBox.appendChild(btn);
});

selectAllBtn.onclick = () => {
  const chips = document.querySelectorAll(".chip");
  const allSelected = document.querySelectorAll(".chip.selected").length === FOLDERS.length;
  chips.forEach(c => {
    if (allSelected) {
      c.classList.remove("selected");
      c.setAttribute("aria-pressed", "false");
    } else {
      c.classList.add("selected");
      c.setAttribute("aria-pressed", "true");
    }
  });
  updateState();
};

openBtn.onclick = () => {
  const selectedIds = [...document.querySelectorAll(".chip.selected")].map(x => x.dataset.id);
  const targets = FOLDERS.filter(f => selectedIds.includes(f.id));
  if (targets.length === 0) return;

  let blockedCount = 0;
  targets.forEach(t => {
    const w = window.open(t.url, "_blank", "noopener,noreferrer");
    if (!w || w.closed) blockedCount++;
  });

  const fb = document.getElementById("fallback");
  const ul = document.getElementById("fallbackList");
  if (blockedCount > 0) {
    fb.style.display = "block";
    ul.innerHTML = "";
    targets.forEach(t => {
      const li = document.createElement("li");
      const a = document.createElement("a");
      a.href = t.url;
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      a.textContent = t.name;
      li.appendChild(a);
      ul.appendChild(li);
    });
  } else {
    fb.style.display = "none";
  }
};
</script>
</body>
</html>
